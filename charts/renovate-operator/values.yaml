# -- override the fullname of created resources
fullnameOverride: ""

# -- number of operator replicas. Leader election is enabled automatically when > 1
replicaCount: 1

crd:
  # -- whether to install the CRD or not, set to false if you want to install the CRD separately
  install: true
  mode: template # optional: choose between "hook" and "template" install modes
  image:
    registry: registry.k8s.io
    repository: kubectl
    tag: v1.36.1
    pullPolicy: "IfNotPresent"
    # -- imagePullSecrets for the operator pod
    imagePullSecrets: []
  securityContext:
    pod:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    container:
      capabilities:
        drop:
          - ALL
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
      readOnlyRootFilesystem: true
      privileged: false
      allowPrivilegeEscalation: false

image:
  registry: ghcr.io
  repository: mogenius/renovate-operator
  # -- tag of the renovate-operator, if empty .Chart.AppVersion is used
  tag: ~
  pullPolicy: "IfNotPresent"
  # -- imagePullSecrets for the operator pod
  imagePullSecrets: []

deployment:
  # -- additional annotations for the operator deployment
  annotations: {}
  # -- additional labels for the operator deployment
  labels: {}
  # -- additional labels for the operator pods
  podLabels: {}
  # -- additional annotations for the operator pods
  podAnnotations: {}
  # -- revision history limit for the operator deployment
  revisionHistoryLimit: 10

config:
  # -- default backoff limit for renovate jobs
  defaultJobBackoffLimit: 1
  # -- default active deadline seconds for renovate jobs
  defaultJobActiveDeadlineSeconds: 1800
  # -- whether to delete successfully finished renovate jobs (will lose logs)
  deleteSuccessfulJobs: false
  # -- TTL for finished renovate jobs in seconds, -1 means they are kept forever
  jobTTLSecondsAfterFinished: -1
  # -- global limit for concurrent renovate executor jobs across all RenovateJobs (0 = unlimited)
  globalParallelismLimit: 0
  logStorage:
    # -- log store mode: "disabled" (default, no-op), valkey (needs to be enabled) or "memory" (cache logs in-memory after job completion)
    mode: disabled
  # -- wether to forward valkey cache to renovatejobs - valkey needs to be configured
  forwardCacheToJobs: true

ingress:
  # -- whether to enable the ingress renovate-operator
  enabled: false
  # -- the ingressclassname for the ingress, default: nginx
  ingressClassName: "nginx"
  # -- the host the ingress should listen for
  host: ~
  # -- tls configuration to be applied on the ingress
  tls: []
    # - hosts:
    #     - renovate.example.com
    #   secretName: renovate-tls
  # -- labels to place on the ingress
  labels: {}
  # -- annotations to place on the ingress
  annotations: {}

# -- HTTPRoute for the operator web ui
route:
  # -- whether to enable the HTTPRoute
  enabled: false
  # -- annotations to place on the HTTPRoute
  annotations: {}
  # -- labels to place on the HTTPRoute
  labels: {}
  # -- hostnames to place on the HTTPRoute
  hostnames: []
  # -- parentRefs to place on the HTTPRoute
  parentRefs: []
  # -- group to place on the HTTPRoute
  group: ""
  # -- kind to place on the HTTPRoute
  kind: Service
  # -- weight to place on the HTTPRoute
  weight: 1
  # -- Any custom rules you want to specify
  additionalRules: []
    # - timeouts:
    #     request: 30s
    #     backendRequest: 30s

webhook:
  enabled: false
  port: 8082
  ingress:
    # -- whether to enable the ingress for the webhook server
    enabled: false
    # -- the ingressclassname for the ingress, default: nginx
    ingressClassName: "nginx"
    # -- the host the ingress should lsiten for
    host: ~
    # -- tls configuration to be applied on the ingress
    tls: []
      # - hosts:
      #     - webhook.renovate.example.com
      #   secretName: webhook-renovate-tls
    # -- labels to place on the ingress
    labels: {}
    # -- annotations to place on the ingress
    annotations: {}
  # -- HTTPRoute for the webhook server
  route:
    # -- whether to enable the HTTPRoute
    enabled: false
    # -- annotations to place on the HTTPRoute
    annotations: {}
    # -- labels to place on the HTTPRoute
    labels: {}
    # -- hostnames to place on the HTTPRoute
    hostnames: []
    # -- parentRefs to place on the HTTPRoute
    parentRefs: []
    # -- group to place on the HTTPRoute
    group: ""
    # -- kind to place on the HTTPRoute
    kind: Service
    # -- weight to place on the HTTPRoute
    weight: 1
    # -- Any custom rules you want to specify
    additionalRules: []
      # - timeouts:
      #     request: 30s
      #     backendRequest: 30s

auth:
  # -- comma-separated list of default groups for RenovateJobs without explicit allowedGroups (empty = all authenticated users can see jobs without explicit group restrictions)
  defaultAllowedGroups: ""
  oidc:
    # -- whether to enable OIDC authentication for the UI
    enabled: false
    # -- OIDC issuer URL (e.g. https://accounts.google.com or https://login.microsoftonline.com/{tenant}/v2.0)
    issuerUrl: ""
    # -- OIDC client ID
    clientId: ""
    # -- name of an existing secret containing the OIDC client secret
    existingSecret: ""
    # -- key in the existing secret that contains the OIDC client secret
    secretKey: "client-secret"
    # -- optional: session encryption secret (auto-generated if empty, but sessions won't survive pod restarts)
    sessionSecretKey: ""
    # -- optional: OIDC redirect URL (auto-detected from ingress host if empty)
    redirectUrl: ""
    # -- optional: skip TLS verification for the OIDC provider (not recommended for production)
    insecureSkipVerify: false
    # -- optional: OIDC end_session_endpoint URL for provider logout (auto-discovered if available)
    logoutUrl: ""
    # -- optional: only accept groups with this prefix (e.g., "renovate-")
    # -- Leave empty to accept all groups. High-security environments should set this.
    allowedGroupPrefix: ""
    # -- optional: only accept groups matching this regex pattern (e.g., "^(team-|platform-).*")
    # -- Leave empty to accept all groups. Can be combined with allowedGroupPrefix.
    allowedGroupPattern: ""
    # -- optional: additional OIDC scopes to request (e.g., "groups" for Keycloak)
    additionalScopes: []
    # -- optional: fetch groups from the OIDC userinfo endpoint and merge with ID token groups (for providers that only expose groups via userinfo)
    fetchUserInfoGroups: false
    caCert:
      # -- name of an existing secret containing a PEM-encoded CA certificate to trust for OIDC TLS connections
      existingSecret: ""
      # -- key in the secret that contains the CA certificate
      key: "ca.crt"
      # -- mount path for the CA certificate inside the operator container
      mountPath: "/etc/ssl/certs/oidc-ca.crt"
  github:
    # -- whether to enable GitHub OAuth authentication for the UI (mutually exclusive with OIDC)
    enabled: false
    # -- GitHub OAuth App client ID
    clientId: ""
    # -- name of an existing secret containing the GitHub OAuth client secret
    existingSecret: ""
    # -- key in the existing secret that contains the GitHub OAuth client secret
    secretKey: "client-secret"
    # -- optional: session encryption secret (auto-generated if empty, but sessions won't survive pod restarts)
    sessionSecretKey: ""
    # -- optional: GitHub OAuth redirect URL (auto-detected from ingress host if empty)
    redirectUrl: ""

rbac:
  # -- if true no clusterrole and clusterrolebinding will be created, only role and rolebinding
  # -- when enabled, the operator will only watch resources in the namespace it is deployed to
  ownNamespaceOnly: false
  # -- optional: specify a custom namespace to watch (defaults to the release namespace when ownNamespaceOnly is true)
  watchNamespace: ""

# -- security context for the pod and containers
securityContext:
  pod:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  container:
    capabilities:
      drop:
        - ALL
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    readOnlyRootFilesystem: true
    privileged: false
    allowPrivilegeEscalation: false

# -- resources for the operator pod
resources: {}
# -- extra environment variables for the operator container
extraEnv: []
# -- extra volumes to add to the operator pod (e.g. for CA certificates)
extraVolumes: []
# -- extra volume mounts to add to the operator container
extraVolumeMounts: []
# -- nodeSelector for the operator pod
nodeSelector: {}
# -- tolerations for the operator pod
tolerations: []
# -- affinity for the operator pod
affinity: {}
# -- topologySpreadConstraints for the operator pod
topologySpreadConstraints: []
# -- priorityClassName for the operator pod
priorityClassName: ""

serviceAccount:
  # -- name of the serviceaccount, if not set a name is generated using the fullname template
  name: ~
  # -- whether a serviceaccount should be created
  create: true
  # -- annotations to add to the serviceaccount
  annotations: {}
  # -- labels to add to the serviceaccount
  labels: {}

logging:
  # -- log level for the operator, one of 'debug', 'info', 'error', 'panic'or any integer value > 0
  level: "info"
  # -- log format for the operator, one of: json, console
  format: "json"

# -- optional: deploy a Valkey instance for session storage (recommended for multi-replica)
valkey:
  enabled: false
  # -- name of an existing secret containing the Valkey URL for session storage
  # -- Use this to provide a Valkey URL (e.g., "redis://:password@valkey:6379/0") via a Kubernetes secret
  # -- When set, sessions are stored in Valkey (recommended for multi-replica deployments)
  existingSecret: ""
  # -- key in the existing secret that contains the Valkey URL
  existingSecretKey: "valkey-url"
  auth:
    enabled: true
    aclUsers:
      default:
        password: ""
        permissions: "~* &* +@all"
  dataStorage:
    enabled: false
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false

metrics:
  enabled: false
  serviceMonitor:
    # -- whether to create a ServiceMonitor for the operator metrics
    enabled: false
    # -- scrape interval for the ServiceMonitor, defaults to Prometheus global scrape interval
    interval: ~
  dashboard:
    # -- whether to create a Grafana dashboard for the operator metrics
    enabled: false
    annotations: {}
    labels:
      grafana_dashboard: "1"
    # -- namespace to create the dashboard in, defaults to the release namespace
    namespace: ~
    # -- GrafanaDashboard CR is created when metrics.dashboard.enabled is true and grafana-operator CRDs are present
    # -- all fields below are passed to the GrafanaDashboard CR spec
    grafanaDashboard:
      allowCrossNamespaceImport: false
      instanceSelector:
        matchLabels:
          grafana.internal/instance: "grafana"

# -- list of extra manifests
extraManifests: []
  #- |
  #  apiVersion: v1
  #  data:
  #    client-secret: XXXXXXXXXXXXXXXXXXX
  #  kind: Secret
  #  metadata:
  #    name: oidc-secret
  #    namespace: renovate-operator
  #  type: Opaque

# -- OpenTelemetry configuration for the operator
telemetry:
  # -- enable OTLP export of traces, metrics, and logs from the operator
  enabled: false
  # -- OTLP gRPC endpoint for the operator (host:port format, e.g. "my-collector:4317")
  endpoint: ""
  # -- OTLP protocol for the operator. Only "grpc" is currently supported.
  protocol: "grpc"
  # -- forward OTEL_* env vars to Renovate Jobs (uses Renovate's native OTLP/HTTP exporter)
  forwardToJobs: false
  # -- OTLP/HTTP endpoint for Renovate Jobs (full URL, e.g. "http://my-collector:4318").
  # -- Defaults to telemetry.endpoint. Set this explicitly when the operator endpoint is a
  # -- gRPC host:port so that Jobs receive a proper HTTP URL for Renovate's OTLP/HTTP exporter.
  jobEndpoint: ""
